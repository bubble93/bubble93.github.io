            <blockquote>
<p>比较字符串<br>（蛤蟆可以吃队友，也可以吃对手）<br>如果数组第一个字符串元素包含了第二个字符串元素的所有字符，函数返回true。<br>举例，[“hello”, “Hello”]应该返回true，因为在忽略大小写的情况下，第二个字符串的所有字符都可以在第一个字符串找到。</p>
</blockquote>

<h2 id="更改后"><a href="#更改后" class="headerlink" title="更改后"></a>更改后</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">  function mutation(arr) &#123;</span><br><span class="line">    // 请把你的代码写在这里</span><br><span class="line">    var new_arr0 = arr[0].toLowerCase();</span><br><span class="line">    var new_arr1 = arr[1].toLowerCase();</span><br><span class="line">    var values = new_arr1.split(&quot;&quot;);</span><br><span class="line">    var return_value = true;</span><br><span class="line">    values.map(function(a)&#123;</span><br><span class="line">      if(new_arr0.indexOf(a) == -1)&#123;</span><br><span class="line">        console.log(&quot;retrun false&quot;);</span><br><span class="line">        return_value = false;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;);</span><br><span class="line">    return return_value;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<hr>
<h1 id="原因分析"><a href="#原因分析" class="headerlink" title="原因分析"></a>原因分析</h1><blockquote>
<p>由于闭包原因导致无法return，return只是终止了传进map里面的那一次方法，后续还能继续调用。</p>
